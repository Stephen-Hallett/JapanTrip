services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: JapanPlanner
    ports:
      - "${APP_PORT:-8080}:3001"
    volumes:
      - ${DB_DATA_PATH:-./data}:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e ''fetch("http://localhost:3001/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))''',
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  default:
    name: japanplanner_network
